<!DOCTYPE html>
<html lang="pl" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomeLab Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <style>
    body { background: #0f1117; font-family: 'Inter', system-ui, sans-serif; }
    .card { background: #1a1d27; border: 1px solid #2a2d3a; }
    .pulse-dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .log-line { font-family: 'Courier New', monospace; font-size: 12px; }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: #1a1d27; }
    ::-webkit-scrollbar-thumb { background: #3a3d4a; border-radius: 2px; }
    .service-row:hover { background: rgba(255,255,255,0.03); }
  </style>
</head>
<body class="text-gray-100 min-h-screen">

<!-- Header -->
<header class="border-b border-gray-800 px-6 py-4 flex items-center justify-between sticky top-0 z-10" style="background:#0f1117">
  <div class="flex items-center gap-3">
    <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-sm font-bold">H</div>
    <span class="text-lg font-semibold">HomeLab Dashboard</span>
    <span class="text-xs text-gray-500 ml-2" id="laptop-ip">Loading...</span>
  </div>
  <div class="flex items-center gap-4">
    <div id="server-status" class="flex items-center gap-2 text-sm">
      <div class="w-2 h-2 rounded-full bg-gray-500"></div>
      <span class="text-gray-400">Connecting...</span>
    </div>
    <span class="text-xs text-gray-600" id="last-update">—</span>
    <button onclick="refresh()" class="text-xs px-3 py-1 rounded bg-gray-800 hover:bg-gray-700 transition">↻ Refresh</button>
  </div>
</header>

<main class="max-w-7xl mx-auto px-6 py-6 space-y-6">

  <!-- Metrics Row -->
  <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
    <div class="card rounded-xl p-4">
      <div class="text-xs text-gray-500 uppercase tracking-wide mb-2">CPU</div>
      <div class="text-3xl font-bold" id="cpu-val">—</div>
      <div class="mt-2 h-1.5 bg-gray-800 rounded-full overflow-hidden">
        <div id="cpu-bar" class="h-full bg-indigo-500 rounded-full transition-all duration-500" style="width:0%"></div>
      </div>
    </div>
    <div class="card rounded-xl p-4">
      <div class="text-xs text-gray-500 uppercase tracking-wide mb-2">RAM</div>
      <div class="text-3xl font-bold" id="ram-val">—</div>
      <div class="text-xs text-gray-500 mt-1" id="ram-detail">—</div>
      <div class="mt-2 h-1.5 bg-gray-800 rounded-full overflow-hidden">
        <div id="ram-bar" class="h-full bg-violet-500 rounded-full transition-all duration-500" style="width:0%"></div>
      </div>
    </div>
    <div class="card rounded-xl p-4">
      <div class="text-xs text-gray-500 uppercase tracking-wide mb-2">DYSK (SSD)</div>
      <div class="text-3xl font-bold" id="disk-val">—</div>
      <div class="text-xs text-gray-500 mt-1" id="disk-detail">—</div>
      <div class="mt-2 h-1.5 bg-gray-800 rounded-full overflow-hidden">
        <div id="disk-bar" class="h-full bg-emerald-500 rounded-full transition-all duration-500" style="width:0%"></div>
      </div>
    </div>
    <div class="card rounded-xl p-4">
      <div class="text-xs text-gray-500 uppercase tracking-wide mb-2">TEMP / UPTIME</div>
      <div class="text-3xl font-bold" id="temp-val">—</div>
      <div class="text-xs text-gray-500 mt-1" id="uptime-val">—</div>
    </div>
  </div>

  <!-- Services + Logs -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">

    <!-- Services -->
    <div class="lg:col-span-2 card rounded-xl overflow-hidden">
      <div class="px-5 py-4 border-b border-gray-800 flex items-center justify-between">
        <h2 class="font-semibold">Usługi</h2>
        <span class="text-xs text-gray-500" id="services-count">—</span>
      </div>
      <div id="services-table" class="divide-y divide-gray-800/50">
        <div class="px-5 py-8 text-center text-gray-600 text-sm">Ładowanie...</div>
      </div>
    </div>

    <!-- Logs -->
    <div class="card rounded-xl overflow-hidden flex flex-col">
      <div class="px-5 py-4 border-b border-gray-800 flex items-center justify-between">
        <h2 class="font-semibold">Logi</h2>
        <select id="log-service" onchange="loadLogs()" class="text-xs bg-gray-800 border border-gray-700 rounded px-2 py-1 text-gray-300">
          <option value="">-- wybierz usługę --</option>
        </select>
      </div>
      <div id="log-output" class="flex-1 overflow-y-auto p-3 space-y-0.5 text-gray-400 min-h-48 max-h-80">
        <div class="text-gray-600 text-xs text-center pt-4">Wybierz usługę</div>
      </div>
    </div>
  </div>

  <!-- Storage -->
  <div class="card rounded-xl p-5">
    <h2 class="font-semibold mb-4">Storage (/mnt/ssd)</h2>
    <div class="flex items-center gap-6">
      <div class="flex-1">
        <div class="flex justify-between text-sm mb-2">
          <span class="text-gray-400">Zajęte: <span id="storage-used" class="text-white font-medium">—</span></span>
          <span class="text-gray-400">Wolne: <span id="storage-free" class="text-white font-medium">—</span></span>
          <span class="text-gray-400">Łącznie: <span id="storage-total" class="text-white font-medium">—</span></span>
        </div>
        <div class="h-4 bg-gray-800 rounded-full overflow-hidden">
          <div id="storage-bar" class="h-full rounded-full transition-all duration-700"
               style="width:0%; background: linear-gradient(90deg, #6366f1, #8b5cf6)"></div>
        </div>
        <div class="text-right text-xs text-gray-500 mt-1" id="storage-pct">—</div>
      </div>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="card rounded-xl p-5">
    <h2 class="font-semibold mb-4">Szybkie akcje</h2>
    <div class="flex flex-wrap gap-2">
      <a id="link-nextcloud" href="#" target="_blank"
         class="px-4 py-2 rounded-lg bg-blue-900/30 hover:bg-blue-900/50 border border-blue-800/50 text-blue-300 text-sm transition">
        ☁ Nextcloud
      </a>
      <a id="link-jellyfin" href="#" target="_blank"
         class="px-4 py-2 rounded-lg bg-purple-900/30 hover:bg-purple-900/50 border border-purple-800/50 text-purple-300 text-sm transition">
        🎬 Jellyfin
      </a>
      <a id="link-adguard" href="#" target="_blank"
         class="px-4 py-2 rounded-lg bg-green-900/30 hover:bg-green-900/50 border border-green-800/50 text-green-300 text-sm transition">
        🛡 AdGuard
      </a>
      <a id="link-portainer" href="#" target="_blank"
         class="px-4 py-2 rounded-lg bg-orange-900/30 hover:bg-orange-900/50 border border-orange-800/50 text-orange-300 text-sm transition">
        🐳 Portainer
      </a>
      <a id="link-traefik" href="#" target="_blank"
         class="px-4 py-2 rounded-lg bg-gray-900/30 hover:bg-gray-800/50 border border-gray-700/50 text-gray-300 text-sm transition">
        ↔ Traefik
      </a>
    </div>
  </div>

</main>

<!-- Toast -->
<div id="toast" class="fixed bottom-6 right-6 px-4 py-2 rounded-lg text-sm font-medium hidden transition-all"></div>

<script>
let laptopIp = '192.168.1.100';

function toast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `fixed bottom-6 right-6 px-4 py-2 rounded-lg text-sm font-medium transition-all ${
    type === 'error' ? 'bg-red-900 text-red-200' :
    type === 'success' ? 'bg-green-900 text-green-200' : 'bg-gray-800 text-gray-200'
  }`;
  t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), 3000);
}

function bar(id, pct, warn = 75, danger = 90) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.width = pct + '%';
  el.className = el.className.replace(/bg-\w+-\d+/, '');
  if (pct >= danger) el.classList.add('bg-red-500');
  else if (pct >= warn) el.classList.add('bg-yellow-500');
  else el.classList.add(id === 'cpu-bar' ? 'bg-indigo-500' : id === 'ram-bar' ? 'bg-violet-500' : 'bg-emerald-500');
}

function uptime(s) {
  const d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600), m = Math.floor((s % 3600) / 60);
  if (d > 0) return `${d}d ${h}h`;
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

async function loadConfig() {
  try {
    const r = await fetch('/api/config');
    const d = await r.json();
    laptopIp = d.laptop_ip || laptopIp;
    document.getElementById('laptop-ip').textContent = `Server: ${laptopIp}`;
    const links = {
      'link-nextcloud': `http://${laptopIp}:8080`,
      'link-jellyfin': `http://${laptopIp}:8096`,
      'link-adguard': `http://${laptopIp}:3001`,
      'link-portainer': `http://${laptopIp}:9000`,
      'link-traefik': `http://${laptopIp}:8090`,
    };
    for (const [id, url] of Object.entries(links)) {
      const el = document.getElementById(id);
      if (el) el.href = url;
    }
  } catch {}
}

async function refresh() {
  try {
    const r = await fetch('/api/status');
    const d = await r.json();

    const statusEl = document.getElementById('server-status');
    if (!d.online) {
      statusEl.innerHTML = `<div class="w-2 h-2 rounded-full bg-red-500 pulse-dot"></div><span class="text-red-400">Offline</span>`;
      document.getElementById('services-table').innerHTML =
        '<div class="px-5 py-8 text-center text-red-500 text-sm">Brak połączenia z serwerem</div>';
      return;
    }
    statusEl.innerHTML = `<div class="w-2 h-2 rounded-full bg-green-500 pulse-dot"></div><span class="text-green-400">Online</span>`;
    document.getElementById('last-update').textContent = new Date().toLocaleTimeString('pl-PL');

    // Metrics
    const m = d.metrics || {};
    document.getElementById('cpu-val').textContent = (m.cpu_percent ?? '—') + '%';
    bar('cpu-bar', m.cpu_percent || 0);

    document.getElementById('ram-val').textContent = (m.ram_percent ?? '—') + '%';
    document.getElementById('ram-detail').textContent = `${m.ram_used_mb ?? 0} / ${m.ram_total_mb ?? 0} MB`;
    bar('ram-bar', m.ram_percent || 0);

    document.getElementById('disk-val').textContent = (m.disk_percent ?? '—') + '%';
    document.getElementById('disk-detail').textContent = `${m.disk_used_gb ?? 0} / ${m.disk_total_gb ?? 0} GB`;
    bar('disk-bar', m.disk_percent || 0, 80, 95);

    document.getElementById('temp-val').textContent = m.temp_celsius != null ? m.temp_celsius + '°C' : 'N/A';
    document.getElementById('uptime-val').textContent = m.uptime_seconds ? uptime(m.uptime_seconds) : '—';

    // Storage
    const s = d.storage || {};
    document.getElementById('storage-used').textContent = (s.disk_used_gb ?? '—') + ' GB';
    document.getElementById('storage-free').textContent = (s.disk_free_gb ?? '—') + ' GB';
    document.getElementById('storage-total').textContent = (s.disk_total_gb ?? '—') + ' GB';
    document.getElementById('storage-pct').textContent = (s.disk_percent ?? '—') + '%';
    const pct = s.disk_percent || 0;
    const sb = document.getElementById('storage-bar');
    sb.style.width = pct + '%';
    sb.style.background = pct > 90 ? 'linear-gradient(90deg,#ef4444,#dc2626)' :
      pct > 75 ? 'linear-gradient(90deg,#f59e0b,#d97706)' :
      'linear-gradient(90deg,#6366f1,#8b5cf6)';

    // Services
    const services = d.services || [];
    const running = services.filter(s => s.status === 'running').length;
    document.getElementById('services-count').textContent = `${running}/${services.length} running`;

    // Populate log dropdown
    const sel = document.getElementById('log-service');
    const prev = sel.value;
    sel.innerHTML = '<option value="">-- wybierz usługę --</option>';
    services.forEach(svc => {
      const opt = document.createElement('option');
      opt.value = svc.name;
      opt.textContent = svc.name;
      if (svc.name === prev) opt.selected = true;
      sel.appendChild(opt);
    });

    if (services.length === 0) {
      document.getElementById('services-table').innerHTML =
        '<div class="px-5 py-8 text-center text-gray-600 text-sm">Brak usług</div>';
      return;
    }

    document.getElementById('services-table').innerHTML = services.map(svc => `
      <div class="service-row px-5 py-3 flex items-center justify-between gap-4 transition-colors">
        <div class="flex items-center gap-3 min-w-0">
          <div class="w-2 h-2 rounded-full flex-shrink-0 ${svc.status === 'running' ? 'bg-green-500' : 'bg-red-500'}"></div>
          <div>
            <div class="font-medium text-sm">${svc.name}</div>
            <div class="text-xs text-gray-500 truncate max-w-xs">${svc.ports || svc.image || ''}</div>
          </div>
        </div>
        <div class="flex items-center gap-2 flex-shrink-0">
          <span class="text-xs px-2 py-0.5 rounded-full ${
            svc.status === 'running'
              ? 'bg-green-900/40 text-green-400 border border-green-800/50'
              : 'bg-red-900/40 text-red-400 border border-red-800/50'
          }">${svc.status}</span>
          <button onclick="restartService('${svc.name}')"
            class="text-xs px-2 py-1 rounded bg-indigo-900/40 hover:bg-indigo-900/70 border border-indigo-800/50 text-indigo-300 transition">
            ↻
          </button>
          ${svc.status === 'running' ? `
          <button onclick="stopService('${svc.name}')"
            class="text-xs px-2 py-1 rounded bg-red-900/30 hover:bg-red-900/60 border border-red-800/50 text-red-400 transition">
            ■
          </button>` : ''}
        </div>
      </div>
    `).join('');

  } catch(e) {
    console.error(e);
  }
}

async function restartService(name) {
  toast(`Restarting ${name}...`);
  try {
    const r = await fetch('/api/services/restart', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({service: name})
    });
    const d = await r.json();
    d.success ? toast(`${name} restarted`, 'success') : toast(`Error: ${d.error || d.output}`, 'error');
    setTimeout(refresh, 2000);
  } catch(e) { toast('Connection error', 'error'); }
}

async function stopService(name) {
  if (!confirm(`Stop ${name}?`)) return;
  try {
    const r = await fetch('/api/services/stop', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({service: name})
    });
    const d = await r.json();
    d.success ? toast(`${name} stopped`, 'success') : toast(`Error: ${d.error}`, 'error');
    setTimeout(refresh, 2000);
  } catch(e) { toast('Connection error', 'error'); }
}

async function loadLogs() {
  const svc = document.getElementById('log-service').value;
  if (!svc) return;
  const el = document.getElementById('log-output');
  el.innerHTML = '<div class="text-gray-600 text-xs text-center pt-4">Ładowanie...</div>';
  try {
    const r = await fetch(`/api/logs/${svc}`);
    const d = await r.json();
    const lines = d.logs || [];
    el.innerHTML = lines.filter(Boolean).map(l => {
      const cls = l.includes('ERROR') || l.includes('error') ? 'text-red-400' :
                  l.includes('WARN') || l.includes('warn') ? 'text-yellow-400' :
                  l.includes('INFO') ? 'text-gray-400' : 'text-gray-500';
      return `<div class="log-line ${cls} py-0.5 border-b border-gray-800/30">${escHtml(l)}</div>`;
    }).join('') || '<div class="text-gray-600 text-xs text-center pt-4">Brak logów</div>';
    el.scrollTop = el.scrollHeight;
  } catch(e) {
    el.innerHTML = '<div class="text-red-500 text-xs text-center pt-4">Błąd ładowania logów</div>';
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Init
loadConfig().then(() => {
  refresh();
  setInterval(refresh, 10000);
});
</script>
</body>
</html>
