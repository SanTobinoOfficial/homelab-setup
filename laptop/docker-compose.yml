version: "3.9"

networks:
  homelab:
    driver: bridge

services:

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # TRAEFIK â€” Reverse Proxy + Auth middleware
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--accesslog.filepath=/logs/access.log"
    ports:
      - "80:80"
      - "8090:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/ssd/docker/traefik/logs:/logs
    networks:
      - homelab

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # AUTHELIA â€” Authentication + Role-based access
  # Chroni wraĹĽliwe usĹ‚ugi (Portainer, Traefik) za logowaniem
  # UĹĽytkownicy i grupy konfigurowane w users_database.yml
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  authelia:
    image: authelia/authelia:latest
    container_name: authelia
    restart: unless-stopped
    volumes:
      - /mnt/ssd/docker/authelia:/config
    environment:
      TZ: Europe/Warsaw
    ports:
      - "9091:9091"
    networks:
      - homelab
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.authelia.rule=Host(`auth.homelab.local`)"
      - "traefik.http.services.authelia.loadbalancer.server.port=9091"
      - "traefik.http.middlewares.authelia.forwardauth.address=http://authelia:9091/api/verify?rd=http://auth.homelab.local"
      - "traefik.http.middlewares.authelia.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.authelia.forwardauth.authResponseHeaders=Remote-User,Remote-Groups,Remote-Name,Remote-Email"

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # HEIMDALL â€” Dashboard uĹĽytkownika (zamiast custom portalu)
  # KaĹĽdy uĹĽytkownik ma swĂłj zestaw zakĹ‚adek/skrĂłtĂłw
  # http://<laptop>:8888
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  heimdall:
    image: lscr.io/linuxserver/heimdall:latest
    container_name: heimdall
    restart: unless-stopped
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Europe/Warsaw
    volumes:
      - /mnt/ssd/docker/heimdall:/config
    ports:
      - "8888:80"
    networks:
      - homelab
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.heimdall.rule=Host(`portal.homelab.local`)"
      - "traefik.http.services.heimdall.loadbalancer.server.port=80"

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # PI-HOLE â€” DNS + DHCP + Ad blocking
  # ZastÄ™puje AdGuard. Pi-hole v6 obsĹ‚uguje profile per-klient (po MAC).
  # Web UI: http://<laptop>:8053/admin
  # DNS: port 53 | DHCP: port 67
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    environment:
      TZ: Europe/Warsaw
      WEBPASSWORD: ${PIHOLE_PASSWORD}
      PIHOLE_DNS_: "8.8.8.8;1.1.1.1"
      DNSMASQ_LISTENING: all
      # DHCP (opcjonalne â€” wĹ‚Ä…cz jeĹ›li chcesz Pi-hole jako DHCP serwer)
      # DHCP_ACTIVE: "true"
      # DHCP_START: "192.168.1.50"
      # DHCP_END: "192.168.1.200"
      # DHCP_ROUTER: "192.168.1.1"
    volumes:
      - /mnt/ssd/docker/pihole/etc:/etc/pihole
      - /mnt/ssd/docker/pihole/dnsmasq:/etc/dnsmasq.d
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "67:67/udp"   # DHCP
      - "8053:80"     # Web UI na 8053 ĹĽeby nie kolidowaÄ‡ z Traefik
    networks:
      - homelab
    cap_add:
      - NET_ADMIN

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # MARIADB â€” baza danych Nextcloud
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  nextcloud-db:
    image: mariadb:10.11
    container_name: nextcloud-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /mnt/ssd/docker/nextcloud/db:/var/lib/mysql
    networks:
      - homelab
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # NEXTCLOUD â€” NAS / Cloud / User files
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  nextcloud:
    image: nextcloud:28-apache
    container_name: nextcloud
    restart: unless-stopped
    depends_on:
      nextcloud-db:
        condition: service_healthy
    environment:
      MYSQL_HOST: nextcloud-db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: ${DB_PASSWORD}
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: "192.168.1.40 192.168.1.100 localhost nextcloud.local"
      OVERWRITEPROTOCOL: http
    volumes:
      - /mnt/ssd/docker/nextcloud/data:/var/www/html
      - /mnt/ssd/users:/var/www/html/data
    ports:
      - "8080:80"
    networks:
      - homelab
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nextcloud.rule=Host(`nextcloud.local`)"
      - "traefik.http.services.nextcloud.loadbalancer.server.port=80"

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # JELLYFIN â€” Media Server
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    environment:
      JELLYFIN_PublishedServerUrl: http://192.168.1.100:8096
    volumes:
      - /mnt/ssd/docker/jellyfin/config:/config
      - /mnt/ssd/docker/jellyfin/cache:/cache
      - /mnt/ssd/media:/media:ro
    ports:
      - "8096:8096"
    networks:
      - homelab
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.local`)"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # PORTAINER â€” Docker Management
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /mnt/ssd/docker/portainer/data:/data
    ports:
      - "9000:9000"
    networks:
      - homelab

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # NODE AGENT â€” REST API dla Admin Dashboard na PC
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  node-agent:
    image: python:3.11-slim
    container_name: node-agent
    restart: unless-stopped
    working_dir: /app
    volumes:
      - /mnt/ssd/agent:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - /mnt/ssd:/mnt/ssd:ro
    ports:
      - "9090:9090"
    command: ["python", "-u", "agent.py"]
    environment:
      AGENT_API_KEY: ${AGENT_API_KEY}
    networks:
      - homelab

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # DISCORD BOT â€” kontrola przez Discord
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  discord-bot:
    image: node:20-slim
    container_name: homelab-discord-bot
    restart: unless-stopped
    working_dir: /app
        volumes:
      - /opt/homelab/discord-bot:/app
      - /root/.claude:/root/.claude:ro
    command: sh -c "npm install --omit=dev && npm install -g @anthropic-ai/claude-code 2>/dev/null; node bot.js"
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      ALLOWED_CHANNEL_ID: ${ALLOWED_CHANNEL_ID}
      ADMIN_USER_ID: ${ADMIN_USER_ID}
      AGENT_URL: http://node-agent:9090
      AGENT_API_KEY: ${AGENT_API_KEY}
      CLAUDE_CLI: claude
      CLAUDE_TIMEOUT: "120"
    depends_on:
      - node-agent
    networks:
      - homelab

  # ─────────────────────────────────────
  # TTYD — Web Terminal (SSH konsola z przeglądarki)
  # http://<laptop>:7681
  # ─────────────────────────────────────
  ttyd:
    image: tsl0922/ttyd:latest
    container_name: ttyd
    restart: unless-stopped
    command: ttyd -p 7681 -t fontSize=14 -t theme={"background":"#0a0c12","foreground":"#e5e7eb"} login
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/homelab:/opt/homelab
      - /mnt/ssd:/mnt/ssd
    ports:
      - "7681:7681"
    networks:
      - homelab
    privileged: true